<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Analytics — Sign in</title>
<style>
  :root {
    --page: #f9f9f7; --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
    --border: rgba(11,11,11,0.10); --accent: #2a78d6; --danger: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d; --surface: #1a1a19; --ink: #ffffff; --ink-2: #c3c2b7;
      --border: rgba(255,255,255,0.10); --accent: #3987e5;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page); color: var(--ink);
    min-height: 100vh; display: grid; place-items: center;
  }
  form {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 32px; width: min(360px, 90vw); display: grid; gap: 12px;
  }
  h1 { font-size: 18px; }
  p { color: var(--ink-2); font-size: 13px; }
  input {
    font: inherit; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--page); color: var(--ink);
  }
  button {
    font: inherit; font-weight: 600; padding: 10px; border: 0; border-radius: 8px;
    background: var(--accent); color: #fff; cursor: pointer;
  }
  #err { color: var(--danger); font-size: 13px; display: none; }
</style>
</head>
<body>
<form id="f">
  <h1>Game Analytics</h1>
  <p>Enter the admin password to view your dashboards.</p>
  <input type="password" id="pw" placeholder="Password" autofocus autocomplete="current-password">
  <button>Sign in</button>
  <span id="err">Wrong password.</span>
</form>
<script>
  document.getElementById("f").addEventListener("submit", async (e) => {
    e.preventDefault();
    const r = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: document.getElementById("pw").value }),
    });
    if (r.ok) location.reload();
    else document.getElementById("err").style.display = "block";
  });
</script>
</body>
</html>
